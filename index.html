<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Karaman Aber Sanat Gücü</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; }
        .section-title { font-size: 2rem; border-bottom: 2px solid #000; padding-bottom: 10px; margin: 40px 0 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ccc; padding: 15px; text-align: center; }
        .card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Karaman Aber Sanat Gücü</h1>
        
        <section id="yonetim">
            <h2 class="section-title">Yönetim Kurulu</h2>
            <div id="board-grid" class="grid"></div>
        </section>

        <section id="teknik">
            <h2 class="section-title">Teknik Heyet</h2>
            <div id="tech-grid" class="grid"></div>
        </section>

        <section id="fikstur">
            <h2 class="section-title">Fikstür</h2>
            <table id="fix-table" border="1" width="100%">
                <thead><tr><th>Maç</th><th>Skor</th><th>Tarih</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script>
        // Site verilerini güvenli tutar
        let data = { board: [], tech: [], fixtures: [] };

        function init() {
            try {
                const saved = localStorage.getItem('aber_sk_data');
                if (saved) {
                    data = JSON.parse(saved);
                }
                render();
            } catch(e) {
                console.log("Hata oluştu, veriler sıfırlandı.");
                render();
            }
        }

        function render() {
            // Yönetim
            const bGrid = document.getElementById('board-grid');
            bGrid.innerHTML = data.board.map(b => `<div class="card"><img src="${b.img}"><h3>${b.name}</h3><p>${b.role}</p></div>`).join('');
            
            // Teknik
            const tGrid = document.getElementById('tech-grid');
            tGrid.innerHTML = data.tech.map(t => `<div class="card"><img src="${t.img}"><h3>${t.name}</h3><p>${t.role}</p></div>`).join('');
            
            // Fikstür
            const fBody = document.querySelector('#fix-table tbody');
            fBody.innerHTML = data.fixtures.map(f => `<tr><td>${f.home} - ${f.away}</td><td>${f.score}</td><td>${f.date}</td></tr>`).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
