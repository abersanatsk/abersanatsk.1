<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Karaman Aber Sanat Gücü</title>
    <style>
        /* Hata durumunda bile en azından bu bloklar görünecek */
        body { font-family: sans-serif; }
        .section-title { font-size: 2rem; font-weight: bold; margin: 2rem 0; }
        .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <!-- İçerik Alanı -->
    <section id="yonetim-kurulu">
        <div class="container">
            <h2 class="section-title">Yönetim Kurulu</h2>
            <div class="board-grid" id="board-container"></div>
        </div>
    </section>

    <section id="teknik-heyet">
        <div class="container">
            <h2 class="section-title">Teknik Heyet</h2>
            <div class="board-grid" id="tech-container"></div>
        </div>
    </section>

    <script>
        // --- GÜVENLİ YÜKLEME MOTORU ---
        let activeData = {};

        function loadAllData() {
            try {
                const saved = localStorage.getItem('aber_sk_pro_data_v6');
                if (!saved) {
                    console.log("Veri bulunamadı, varsayılanlar yükleniyor.");
                    activeData = { board: [], tech: [], players: [], fixtures: [], posts: [] };
                } else {
                    activeData = JSON.parse(saved);
                    // Dizi kontrolleri (Hata vermemesi için)
                    if (!Array.isArray(activeData.board)) activeData.board = [];
                    if (!Array.isArray(activeData.tech)) activeData.tech = [];
                }
                renderBoardAndTech();
            } catch (e) {
                console.error("Kritik Hata, yapı sıfırlanıyor:", e);
                // Eğer hata alırsak sistemi sıfırla ki site açılsın
                activeData = { board: [], tech: [], players: [], fixtures: [], posts: [] };
                renderBoardAndTech();
            }
        }

        function renderBoardAndTech() {
            try {
                const bCont = document.getElementById('board-container');
                const tCont = document.getElementById('tech-container');
                
                if (bCont) {
                    bCont.innerHTML = activeData.board.map(b => `<div>${b.name}</div>`).join('');
                }
                if (tCont) {
                    tCont.innerHTML = activeData.tech.map(t => `<div>${t.name}</div>`).join('');
                }
            } catch (e) {
                console.error("Render hatası:", e);
            }
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
